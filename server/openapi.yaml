openapi: 3.0.3
info:
  title: Enzyme API
  description: REST API for Enzyme, a self-hostable Slack alternative
  version: 1.0.0

servers:
  - url: /api
    description: API server

tags:
  - name: server
    description: Server information
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User profile management
  - name: workspaces
    description: Workspace management
  - name: channels
    description: Channel management
  - name: messages
    description: Message operations
  - name: files
    description: File uploads and downloads
  - name: emojis
    description: Custom emoji management
  - name: moderation
    description: Moderation tools including bans, blocks, and audit logging. Most endpoints require admin or owner role.
  - name: sse
    description: Server-Sent Events

paths:
  # Server endpoints
  /server-info:
    get:
      tags: [server]
      summary: Get server information
      description: |
        Returns server version, feature flags, and capability information. Useful for clients to detect which features are available (e.g. email, file uploads) before making further requests. Does not require authentication.
      operationId: getServerInfo
      responses:
        '200':
          description: Server information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'

  # Auth endpoints
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: |
        Create a new user account with an email, password, and display name. Returns a session token that can be used for subsequent authenticated requests. If email verification is enabled on the server, a verification email will be sent.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [auth]
      summary: Log in a user
      description: |
        Authenticate with email and password. Returns a session token and user object. The token should be included as a Bearer token in the Authorization header for all authenticated requests.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out the current user
      description: |
        Invalidate the current session token. After logging out, the token can no longer be used for authenticated requests.
      operationId: logout
      responses:
        '200':
          description: User logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/forgot-password:
    post:
      tags: [auth]
      summary: Request a password reset
      description: |
        Send a password reset email to the specified address. Always returns success regardless of whether the email exists, to prevent email enumeration. Requires email to be enabled on the server.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: 'alice@example.com'
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                type: object
                required: [success, message]
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/reset-password:
    post:
      tags: [auth]
      summary: Reset password with token
      description: |
        Set a new password using a reset token received via email. The token is single-use and expires after a configured duration.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  example: 'enz_v1_01JQ3KMWX8FVN4CPRD6BHTYGSZ'
                new_password:
                  type: string
                  example: 'newsecurepassword456'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/verify-email:
    post:
      tags: [auth]
      summary: Verify email address with token
      description: |
        Confirm ownership of an email address using a verification token received via email. The token is single-use.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  example: 'enz_v1_01JQ3KMWX8FVN4CPRD6BHTYGSZ'
                  minLength: 1
                  maxLength: 128
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/resend-verification:
    post:
      tags: [auth]
      summary: Resend verification email
      description: |
        Request a new email verification link. Useful if the original verification email was lost or expired. Requires the user to be logged in but not yet verified.
      operationId: resendVerification
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [auth]
      summary: Get current user info
      description: |
        Returns the currently authenticated user along with their workspace memberships. This is typically the first call a client makes after login to bootstrap the UI.
      operationId: getMe
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/device-tokens:
    post:
      tags: [auth]
      summary: Register a device token for push notifications
      description: |
        Register a device token for push notifications (FCM for Android, APNs for iOS). Each token is associated with the current user and session. Re-registering an existing token updates its association.
      operationId: registerDeviceToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceTokenRequest'
      responses:
        '200':
          description: Device token registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/device-tokens/{id}:
    delete:
      tags: [auth]
      summary: Unregister a device token
      description: |
        Remove a previously registered device token to stop receiving push notifications on that device.
      operationId: unregisterDeviceToken
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The device token record ID
      responses:
        '204':
          description: Device token removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Workspace endpoints
  /workspaces/create:
    post:
      tags: [workspaces]
      summary: Create a new workspace
      description: |
        Create a new workspace. The authenticated user becomes the owner. Workspace names must be unique and a URL-friendly slug is generated automatically.
      operationId: createWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceInput'
      responses:
        '200':
          description: Workspace created
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/{wid}:
    get:
      tags: [workspaces]
      summary: Get workspace details
      description: |
        Retrieve details for a workspace including its name, icon, settings, and the current user's membership role.
      operationId: getWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Workspace details
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/update:
    post:
      tags: [workspaces]
      summary: Update workspace
      description: |
        Update workspace properties such as name or settings. Requires admin or owner role in the workspace.
      operationId: updateWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceInput'
      responses:
        '200':
          description: Workspace updated
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/members/list:
    post:
      tags: [workspaces]
      summary: List workspace members
      description: |
        List all members of a workspace with their roles, display names, and ban status.
      operationId: listWorkspaceMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceMemberWithUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/members/remove:
    post:
      tags: [workspaces]
      summary: Remove a member from workspace
      description: |
        Remove a member from the workspace. Admins can remove members, owners can remove anyone except themselves. The removed user loses access to all workspace channels.
      operationId: removeWorkspaceMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/leave:
    post:
      tags: [workspaces]
      summary: Leave a workspace
      description: |
        Voluntarily leave a workspace. The workspace owner cannot leave without first transferring ownership. Leaving removes access to all channels in the workspace.
      operationId: leaveWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Successfully left workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/members/update-role:
    post:
      tags: [workspaces]
      summary: Update member role
      description: |
        Change a member's role within the workspace (e.g. member to admin). Only owners can promote to admin, and only admins/owners can change roles. Cannot change your own role.
      operationId: updateWorkspaceMemberRole
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
                role:
                  $ref: '#/components/schemas/WorkspaceRole'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/invites/create:
    post:
      tags: [workspaces]
      summary: Create an invite
      description: |
        Generate an invite link for the workspace. Invites can be configured with a maximum number of uses and an expiration date. Requires the appropriate permission level configured in workspace settings.
      operationId: createWorkspaceInvite
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteInput'
      responses:
        '200':
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: '#/components/schemas/Invite'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/notifications:
    get:
      tags: [workspaces]
      summary: Get notification summaries for all workspaces
      description: |
        Get unread message counts and mention counts for all workspaces the current user belongs to. Useful for showing notification badges in the workspace switcher.
      operationId: getWorkspaceNotifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification summaries per workspace
          content:
            application/json:
              schema:
                type: object
                required: [workspaces]
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceNotificationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/reorder:
    post:
      tags: [workspaces]
      summary: Reorder workspaces for current user
      description: |
        Set a custom display order for workspaces in the sidebar. Accepts a mapping of workspace IDs to sort positions. Only affects the current user's view.
      operationId: reorderWorkspaces
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderWorkspacesInput'
      responses:
        '200':
          description: Workspaces reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /invites/{code}/accept:
    post:
      tags: [workspaces]
      summary: Accept an invite
      description: |
        Join a workspace using an invite code. The invite must be valid (not expired, not at max uses). The user is added as a member and automatically joins the workspace's default channels.
      operationId: acceptInvite
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Channel endpoints
  /workspaces/{wid}/channels/create:
    post:
      tags: [channels]
      summary: Create a channel
      description: |
        Create a new channel in the workspace. Channel names must be unique within the workspace and contain only lowercase letters, numbers, and hyphens. The creator is automatically added as a member with admin role.
      operationId: createChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelInput'
      responses:
        '200':
          description: Channel created
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/channels/list:
    post:
      tags: [channels]
      summary: List channels in workspace
      description: |
        List all channels in the workspace that the current user has access to. Includes the user's membership status and unread counts for each channel. Private channels are only listed if the user is a member.
      operationId: listChannels
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                type: object
                required: [channels]
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelWithMembership'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/{wid}/channels/dm:
    post:
      tags: [channels]
      summary: Create or get DM channel
      description: |
        Create a direct message channel with one or more users. If a DM already exists between the same set of users, returns the existing channel. For two users, creates a 1:1 DM; for more, creates a group DM.
      operationId: createDM
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDMInput'
      responses:
        '200':
          description: DM channel
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /channels/{id}/update:
    post:
      tags: [channels]
      summary: Update channel
      description: |
        Update channel properties such as name, description, or visibility (public/private). Requires channel admin role or workspace admin/owner role.
      operationId: updateChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelInput'
      responses:
        '200':
          description: Channel updated
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/convert:
    post:
      tags: [channels]
      summary: Convert group DM to channel
      description: |
        Convert a group DM into a named public or private channel. Requires the caller to be a member of the group DM. All existing members and message history are preserved.
      operationId: convertGroupDMToChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertGroupDMInput'
      responses:
        '200':
          description: Channel converted
          content:
            application/json:
              schema:
                type: object
                required: [channel]
                properties:
                  channel:
                    $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /channels/{id}/archive:
    post:
      tags: [channels]
      summary: Archive channel
      description: |
        Archive a channel, preventing new messages from being sent. Archived channels remain visible and searchable but are moved to an archived section. Requires channel admin or workspace admin/owner role.
      operationId: archiveChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Channel archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/members/add:
    post:
      tags: [channels]
      summary: Add member to channel
      description: |
        Add a workspace member to a channel. For public channels, any member can add others. For private channels, only channel members can add others.
      operationId: addChannelMember
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
                role:
                  $ref: '#/components/schemas/ChannelRole'
      responses:
        '200':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/members/list:
    post:
      tags: [channels]
      summary: List channel members
      description: |
        List all members of a channel with their roles and join dates.
      operationId: listChannelMembers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChannelMember'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/join:
    post:
      tags: [channels]
      summary: Join a channel
      description: |
        Join a public channel. Private channels cannot be joined directly — a current member must add you using the add member endpoint.
      operationId: joinChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Joined channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/leave:
    post:
      tags: [channels]
      summary: Leave a channel
      description: |
        Leave a channel. You will no longer receive messages or notifications from this channel. The channel owner cannot leave without first transferring ownership.
      operationId: leaveChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Left channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/star:
    post:
      tags: [channels]
      summary: Star a channel
      description: |
        Star a channel to pin it to the top of your sidebar. Starred channels appear in a separate section for quick access.
      operationId: starChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Channel starred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [channels]
      summary: Unstar a channel
      description: |
        Remove a channel from your starred list.
      operationId: unstarChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Channel unstarred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/mark-read:
    post:
      tags: [channels]
      summary: Mark channel as read
      description: |
        Mark a channel as read up to a specific message, or up to the latest message if no message ID is provided. Updates the unread count and clears notification badges for this channel.
      operationId: markChannelRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message_id:
                  type: string
                  example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
                  description: Message ID to mark as last read (defaults to latest message)
      responses:
        '200':
          description: Channel marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkReadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/notifications:
    get:
      tags: [channels]
      summary: Get channel notification preferences
      description: |
        Get the current user's notification preferences for a specific channel, such as whether to receive notifications for all messages, mentions only, or nothing.
      operationId: getChannelNotifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                type: object
                required: [preferences]
                properties:
                  preferences:
                    $ref: '#/components/schemas/NotificationPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [channels]
      summary: Update channel notification preferences
      description: |
        Set notification preferences for a specific channel. Overrides the workspace-level notification defaults for this channel only.
      operationId: updateChannelNotifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferences'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                required: [preferences]
                properties:
                  preferences:
                    $ref: '#/components/schemas/NotificationPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/channels/mark-all-read:
    post:
      tags: [channels]
      summary: Mark all channels as read
      description: |
        Mark all channels in the workspace as read. Clears all unread counts and notification badges across every channel the user is a member of.
      operationId: markAllChannelsRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: All channels marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/{wid}/unreads:
    post:
      tags: [messages]
      summary: List all unread messages across channels
      description: |
        Fetch unread messages across all channels in the workspace. Returns messages grouped by channel with cursor-based pagination. Useful for building an "All Unreads" view.
      operationId: listAllUnreads
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 50
                cursor:
                  type: string
                  example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
      responses:
        '200':
          description: List of unread messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadMessagesResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/{wid}/messages/search:
    post:
      tags: [messages]
      summary: Search messages in workspace
      description: |
        Full-text search across messages in the workspace. Supports filtering by channel, user, and date range. Results include surrounding context and are ranked by relevance.
      operationId: searchMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMessagesInput'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMessagesResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/threads:
    post:
      tags: [messages]
      summary: List threads user is subscribed to
      description: |
        List threads that the current user is subscribed to in the workspace. Includes the root message and latest replies with unread counts. Supports cursor-based pagination.
      operationId: listUserThreads
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 20
                cursor:
                  type: string
                  example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
      responses:
        '200':
          description: List of user threads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadListResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Message endpoints
  /messages/{id}:
    get:
      tags: [messages]
      summary: Get a single message
      description: |
        Retrieve a single message by ID, including its author, reactions, thread metadata, and file attachments.
      operationId: getMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Message details
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/messages/send:
    post:
      tags: [messages]
      summary: Send a message
      description: |
        Send a new message to a channel. Supports plain text content, file attachments (by referencing previously uploaded file IDs), and threading (by setting a parent message ID). The sender must be a member of the channel.
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageInput'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/messages/list:
    post:
      tags: [messages]
      summary: List messages in channel
      description: |
        List messages in a channel with cursor-based pagination. Returns messages in reverse chronological order by default. Supports fetching around a specific message for scroll-to-message functionality.
      operationId: listMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListMessagesInput'
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/update:
    post:
      tags: [messages]
      summary: Update a message
      description: |
        Edit the content of a previously sent message. Only the message author can edit their own messages. An edit indicator is shown on the message after updating.
      operationId: updateMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  example: 'Hello, world!'
                  maxLength: 40000
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/delete:
    post:
      tags: [messages]
      summary: Delete a message
      description: |
        Delete a message. Authors can delete their own messages. Channel admins and workspace admins/owners can delete any message in channels they have access to.
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/link-preview/delete:
    post:
      tags: [messages]
      summary: Delete a message's link preview
      description: |
        Remove the link preview (unfurl) from a message. Only the message author can remove link previews from their own messages.
      operationId: deleteLinkPreview
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Link preview deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/reactions/add:
    post:
      tags: [messages]
      summary: Add reaction to message
      description: |
        Add an emoji reaction to a message. Each user can only add each unique emoji once per message. Supports both standard Unicode emoji and custom workspace emoji.
      operationId: addReaction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  example: '👍'
      responses:
        '200':
          description: Reaction added
          content:
            application/json:
              schema:
                type: object
                required: [reaction]
                properties:
                  reaction:
                    $ref: '#/components/schemas/Reaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/reactions/remove:
    post:
      tags: [messages]
      summary: Remove reaction from message
      description: |
        Remove your emoji reaction from a message. You can only remove reactions that you previously added.
      operationId: removeReaction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  example: '👍'
      responses:
        '200':
          description: Reaction removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/mark-unread:
    post:
      tags: [messages]
      summary: Mark message as unread
      description: |
        Mark a message as unread, setting the channel's read position to just before this message. The channel will appear as having unread messages starting from this point.
      operationId: markMessageUnread
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Message marked as unread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/thread/mark-read:
    post:
      tags: [messages]
      summary: Mark thread as read
      description: |
        Mark a thread as read up to a specific reply, or up to the latest reply if no reply ID is provided. Updates the thread's unread count.
      operationId: markThreadRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                last_read_reply_id:
                  type: string
                  example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
                  description: ID of the last read reply (defaults to latest reply)
      responses:
        '200':
          description: Thread marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/thread/list:
    post:
      tags: [messages]
      summary: List thread replies
      description: |
        List replies in a message thread with cursor-based pagination. Returns the thread replies in chronological order.
      operationId: listThread
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListMessagesInput'
      responses:
        '200':
          description: Thread messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/subscription:
    get:
      tags: [messages]
      summary: Get thread subscription status
      description: |
        Check whether the current user is subscribed to a thread. Subscribed users receive notifications for new replies.
      operationId: getThreadSubscription
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Thread subscription status
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: '#/components/schemas/ThreadSubscriptionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/subscribe:
    post:
      tags: [messages]
      summary: Subscribe to thread
      description: |
        Subscribe to a thread to receive notifications for new replies. Users are automatically subscribed when they reply to a thread.
      operationId: subscribeToThread
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Subscribed to thread
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: '#/components/schemas/ThreadSubscriptionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/unsubscribe:
    post:
      tags: [messages]
      summary: Unsubscribe from thread
      description: |
        Unsubscribe from a thread to stop receiving notifications for new replies.
      operationId: unsubscribeFromThread
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Unsubscribed from thread
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: '#/components/schemas/ThreadSubscriptionStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Message pinning endpoints
  /messages/{id}/pin:
    post:
      tags: [messages]
      summary: Pin a message
      description: |
        Pin a message to its channel. Any workspace member with access to the channel can pin messages. A channel can have at most 50 pinned messages. Already-pinned messages cannot be pinned again. The pinned message is returned with updated metadata including the pinned_by user and pinned_at timestamp.

        Errors:
        - 400: Message is already pinned, or the channel has reached the 50-pin limit.
        - 401: Not authenticated.
        - 403: Caller does not have access to the channel.
        - 404: Message not found.
      operationId: pinMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Message pinned
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{id}/unpin:
    post:
      tags: [messages]
      summary: Unpin a message
      description: |
        Unpin a previously pinned message from its channel. Any workspace member with access to the channel can unpin messages (not restricted to the user who originally pinned it). The message is returned with its pin metadata cleared.

        Errors:
        - 401: Not authenticated.
        - 403: Caller does not have access to the channel.
        - 404: Message not found or message is not currently pinned.
      operationId: unpinMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/messageId'
      responses:
        '200':
          description: Message unpinned
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/pins/list:
    post:
      tags: [messages]
      summary: List pinned messages in channel
      description: |
        List all pinned messages in a channel with cursor-based pagination. Returns messages in reverse chronological order of when they were pinned. Only workspace members with access to the channel can list its pins.

        Errors:
        - 401: Not authenticated.
        - 403: Caller does not have access to the channel.
        - 404: Channel not found.
      operationId: listPinnedMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
                limit:
                  type: integer
                  default: 50
      responses:
        '200':
          description: List of pinned messages
          content:
            application/json:
              schema:
                type: object
                required: [messages, has_more]
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageWithUser'
                  has_more:
                    type: boolean
                  next_cursor:
                    type: string
                    example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # File endpoints
  /channels/{id}/files/upload:
    post:
      tags: [files]
      summary: Upload a file
      description: |
        Upload a file to a channel. The file is stored on the server and a file object is returned with an ID that can be referenced when sending a message. Maximum file size and allowed types are configured server-side.
      operationId: uploadFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                required: [file]
                properties:
                  file:
                    type: object
                    required: [id, filename, size, content_type]
                    properties:
                      id:
                        type: string
                        example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
                      filename:
                        type: string
                        example: 'report.pdf'
                      size:
                        type: integer
                        example: 1048576
                      content_type:
                        type: string
                        example: 'application/pdf'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{id}/download:
    get:
      tags: [files]
      summary: Download a file
      description: |
        Download a file by ID. Supports both authenticated requests (Bearer token) and signed URLs (with expires, uid, and sig query parameters) for sharing files externally.
      operationId: downloadFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          schema:
            type: integer
            format: int64
          description: Unix timestamp when the signed URL expires
        - name: uid
          in: query
          schema:
            type: string
          description: User ID for signed URL verification
        - name: sig
          in: query
          schema:
            type: string
          description: HMAC-SHA256 signature for signed URL verification
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{id}/sign-url:
    post:
      tags: [files]
      summary: Get a signed download URL for a file
      description: |
        Generate a time-limited signed URL for downloading a file without authentication. Useful for embedding file links in emails or sharing with external users.
      operationId: signFileUrl
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedUrl'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/sign-urls:
    post:
      tags: [files]
      summary: Get signed download URLs for multiple files
      description: |
        Generate signed download URLs for multiple files in a single request. More efficient than calling the single-file endpoint repeatedly.
      operationId: signFileUrls
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_ids]
              properties:
                file_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Signed URLs
          content:
            application/json:
              schema:
                type: object
                required: [urls]
                properties:
                  urls:
                    type: array
                    items:
                      $ref: '#/components/schemas/SignedUrl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /files/{id}/delete:
    post:
      tags: [files]
      summary: Delete a file
      description: |
        Delete a file from the server. Only the file uploader or a workspace admin/owner can delete files.
      operationId: deleteFile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Emoji endpoints
  /workspaces/{wid}/emojis/upload:
    post:
      tags: [emojis]
      summary: Upload a custom emoji
      description: |
        Upload a custom emoji image for the workspace. Accepts PNG, GIF, or WebP. The emoji name must be unique within the workspace and use only lowercase letters, numbers, and underscores.
      operationId: uploadCustomEmoji
      security:
        - bearerAuth: []
      parameters:
        - name: wid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  example: 'general'
      responses:
        '200':
          description: Emoji uploaded
          content:
            application/json:
              schema:
                type: object
                required: [emoji]
                properties:
                  emoji:
                    $ref: '#/components/schemas/CustomEmoji'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/emojis/list:
    post:
      tags: [emojis]
      summary: List custom emojis for a workspace
      description: |
        List all custom emojis available in the workspace. Returns emoji names and their image URLs.
      operationId: listCustomEmojis
      security:
        - bearerAuth: []
      parameters:
        - name: wid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of custom emojis
          content:
            application/json:
              schema:
                type: object
                required: [emojis]
                properties:
                  emojis:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomEmoji'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /emojis/{id}/delete:
    post:
      tags: [emojis]
      summary: Delete a custom emoji
      description: |
        Delete a custom emoji from the workspace. Only the emoji uploader or a workspace admin/owner can delete custom emojis.
      operationId: deleteCustomEmoji
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Emoji deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Scheduled message endpoints
  /channels/{id}/messages/schedule:
    post:
      tags: [messages]
      summary: Schedule a message for future delivery
      description: |
        Schedule a message for future delivery to a channel. The message will be automatically sent at the specified time. Scheduled messages can be edited or cancelled before delivery.
      operationId: scheduleMessage
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Channel ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleMessageInput'
      responses:
        '200':
          description: Message scheduled
          content:
            application/json:
              schema:
                type: object
                required: [scheduled_message]
                properties:
                  scheduled_message:
                    $ref: '#/components/schemas/ScheduledMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/scheduled-messages:
    post:
      tags: [messages]
      summary: List user's scheduled messages in a workspace
      description: |
        List all pending scheduled messages created by the current user in a workspace.
      operationId: listScheduledMessages
      security:
        - bearerAuth: []
      parameters:
        - name: wid
          in: path
          required: true
          schema:
            type: string
          description: Workspace ID
      responses:
        '200':
          description: Scheduled messages
          content:
            application/json:
              schema:
                type: object
                required: [scheduled_messages, count]
                properties:
                  scheduled_messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScheduledMessage'
                  count:
                    type: integer
                    example: 5
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scheduled-messages/{id}:
    post:
      tags: [messages]
      summary: Get a scheduled message
      description: |
        Retrieve a single scheduled message by ID, including its content, target channel, and scheduled delivery time.
      operationId: getScheduledMessage
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scheduled message
          content:
            application/json:
              schema:
                type: object
                required: [scheduled_message]
                properties:
                  scheduled_message:
                    $ref: '#/components/schemas/ScheduledMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /scheduled-messages/{id}/update:
    post:
      tags: [messages]
      summary: Update a scheduled message
      description: |
        Update the content or delivery time of a pending scheduled message. Cannot update messages that have already been sent.
      operationId: updateScheduledMessage
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduledMessageInput'
      responses:
        '200':
          description: Updated scheduled message
          content:
            application/json:
              schema:
                type: object
                required: [scheduled_message]
                properties:
                  scheduled_message:
                    $ref: '#/components/schemas/ScheduledMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /scheduled-messages/{id}/delete:
    post:
      tags: [messages]
      summary: Delete a scheduled message
      description: |
        Cancel and delete a pending scheduled message. Cannot delete messages that have already been sent.
      operationId: deleteScheduledMessage
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scheduled message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /scheduled-messages/{id}/send-now:
    post:
      tags: [messages]
      summary: Send a scheduled message immediately
      description: |
        Immediately send a scheduled message instead of waiting for its scheduled delivery time. The message is sent and the scheduled entry is removed.
      operationId: sendScheduledMessageNow
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    $ref: '#/components/schemas/MessageWithUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # Voice endpoints
  /channels/{id}/voice/join:
    post:
      tags: [channels]
      summary: Join a voice channel
      description: |
        Join a voice channel and begin WebRTC signaling. Returns an SDP offer and a list of ICE servers (including the embedded TURN server) for the client to use.
      operationId: joinVoiceChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: SDP offer and ICE server configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceJoinResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /channels/{id}/voice/leave:
    post:
      tags: [channels]
      summary: Leave a voice channel
      description: |
        Leave the voice channel and close the WebRTC connection.
      operationId: leaveVoiceChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: Left voice channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/answer:
    post:
      tags: [channels]
      summary: Send SDP answer
      description: |
        Send the client's SDP answer to complete the WebRTC handshake.
      operationId: voiceAnswer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceAnswerRequest'
      responses:
        '200':
          description: Answer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/ice-candidate:
    post:
      tags: [channels]
      summary: Send ICE candidate
      description: |
        Send an ICE candidate for the WebRTC connection.
      operationId: voiceICECandidate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceICECandidateRequest'
      responses:
        '200':
          description: Candidate accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/mute:
    post:
      tags: [channels]
      summary: Toggle self-mute in voice channel
      description: |
        Mute or unmute your own microphone in the voice channel.
      operationId: muteVoice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceMuteRequest'
      responses:
        '200':
          description: Mute state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/deafen:
    post:
      tags: [channels]
      summary: Toggle self-deafen in voice channel
      description: |
        Deafen or undeafen yourself in the voice channel. When deafened, you also become muted.
      operationId: deafenVoice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceDeafenRequest'
      responses:
        '200':
          description: Deafen state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/server-mute:
    post:
      tags: [channels]
      summary: Server-mute a user in voice channel
      description: |
        Mute or unmute another user in the voice channel. Requires admin or owner role.
      operationId: serverMuteVoice
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoiceServerMuteRequest'
      responses:
        '200':
          description: Server mute state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{id}/voice/participants:
    get:
      tags: [channels]
      summary: List voice channel participants
      description: |
        List all users currently connected to the voice channel.
      operationId: listVoiceParticipants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/channelId'
      responses:
        '200':
          description: List of voice participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceParticipantList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # User endpoints
  /users/{id}:
    get:
      tags: [users]
      summary: Get user profile
      description: |
        Retrieve a user's public profile by ID, including display name, avatar, and status.
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/profile:
    post:
      tags: [users]
      summary: Update own profile
      description: |
        Update the current user's profile fields such as display name and status. Changes are reflected across all workspaces.
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileInput'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/me/avatar:
    post:
      tags: [users]
      summary: Upload avatar image
      description: |
        Upload a profile avatar image. Accepts JPEG, PNG, GIF, or WebP. The image is resized and stored on the server, replacing any existing avatar.
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [users]
      summary: Remove avatar
      description: |
        Remove the current user's avatar, reverting to the default Gravatar-based avatar.
      operationId: deleteAvatar
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Avatar removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspaces/{wid}/icon:
    post:
      tags: [workspaces]
      summary: Upload workspace icon
      description: |
        Upload an image to use as the workspace icon. Accepts JPEG, PNG, GIF, or WebP. The image is resized to fit. Requires admin or owner role.
      operationId: uploadWorkspaceIcon
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Icon uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceIconUploadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [workspaces]
      summary: Remove workspace icon
      description: |
        Remove the workspace icon, reverting to the default. Requires admin or owner role.
      operationId: deleteWorkspaceIcon
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Icon removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # Moderation endpoints
  /workspaces/{wid}/bans/create:
    post:
      tags: [moderation]
      summary: Ban a user from workspace
      description: |
        Ban a user from the workspace. Only admins and owners can ban. Cannot ban users with equal or higher role rank (admins cannot ban other admins or the owner). Self-banning is prohibited. Specify duration_hours for a temporary ban (1-8760 hours), or omit for a permanent ban. Set hide_messages to true to hide the banned user's messages from all queries.

        Errors:
        - 400: Self-ban attempted, or target user is not a workspace member.
        - 403: Caller lacks admin/owner role, or target has equal or higher role rank.
        - 404: Workspace not found.
        - 409: User is already banned in this workspace.
      operationId: banUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanUserInput'
      responses:
        '200':
          description: User banned
          content:
            application/json:
              schema:
                type: object
                required: [ban]
                properties:
                  ban:
                    $ref: '#/components/schemas/Ban'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: User already banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /workspaces/{wid}/bans/remove:
    post:
      tags: [moderation]
      summary: Unban a user from workspace
      description: |
        Remove an active ban for a user in the workspace, restoring their access. Only admins and owners can unban users. The user's membership is not automatically restored; they must rejoin or be re-invited.

        Errors:
        - 401: Not authenticated.
        - 403: Caller lacks admin/owner role.
        - 404: Workspace not found or no active ban exists for the specified user.
      operationId: unbanUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
      responses:
        '200':
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/bans/list:
    post:
      tags: [moderation]
      summary: List active bans in workspace
      description: |
        List all currently active bans in the workspace with cursor-based pagination. Only admins and owners can view the ban list. Each ban includes the banned user's display name and email. Expired temporary bans are excluded from results.

        Errors:
        - 401: Not authenticated.
        - 403: Caller lacks admin/owner role.
      operationId: listBans
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
                limit:
                  type: integer
                  default: 50
      responses:
        '200':
          description: List of active bans
          content:
            application/json:
              schema:
                type: object
                required: [bans, has_more]
                properties:
                  bans:
                    type: array
                    items:
                      $ref: '#/components/schemas/BanWithUser'
                  has_more:
                    type: boolean
                  next_cursor:
                    type: string
                    example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/blocks/create:
    post:
      tags: [moderation]
      summary: Block a user in workspace
      description: |
        Block a user within the workspace scope. Blocking is workspace-scoped, meaning the block only applies within this workspace. Blocked users' messages are hidden from the blocker in message queries. Any authenticated workspace member can block another member. Self-blocking is not allowed.

        Errors:
        - 400: Self-block attempted, or target user is not a workspace member.
        - 401: Not authenticated.
        - 403: Caller is not a member of the workspace.
        - 404: Workspace or target user not found.
      operationId: blockUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
      responses:
        '200':
          description: User blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspaces/{wid}/blocks/remove:
    post:
      tags: [moderation]
      summary: Unblock a user in workspace
      description: |
        Remove a block on a user within the workspace scope. Only the user who created the block can remove it. After unblocking, the previously blocked user's messages will be visible again in message queries.

        Errors:
        - 401: Not authenticated.
        - 403: Caller is not a member of the workspace.
      operationId: unblockUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
      responses:
        '200':
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/blocks/list:
    get:
      tags: [moderation]
      summary: List blocked users in workspace
      description: |
        List all users the caller has blocked within this workspace. Returns only the caller's own blocks (users cannot see other members' block lists). Each entry includes the blocked user's display name and email.

        Errors:
        - 401: Not authenticated.
        - 403: Caller is not a member of the workspace.
      operationId: listBlocks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: List of blocked users
          content:
            application/json:
              schema:
                type: object
                required: [blocks]
                properties:
                  blocks:
                    type: array
                    items:
                      $ref: '#/components/schemas/BlockWithUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workspaces/{wid}/moderation-log/list:
    post:
      tags: [moderation]
      summary: List moderation audit log
      description: |
        List the moderation audit log for the workspace with cursor-based pagination. Records all moderation actions including bans, unbans, and role changes. Only admins and owners can view the audit log. Each entry includes the acting user's display name and email for accountability.

        Errors:
        - 401: Not authenticated.
        - 403: Caller lacks admin/owner role.
      operationId: listModerationLog
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cursor:
                  type: string
                  example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
                limit:
                  type: integer
                  default: 50
      responses:
        '200':
          description: List of moderation log entries
          content:
            application/json:
              schema:
                type: object
                required: [entries, has_more]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModerationLogEntryWithActor'
                  has_more:
                    type: boolean
                  next_cursor:
                    type: string
                    example: 'eyJpZCI6IjAxSkVYQU1QTEUifQ'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # SSE endpoints
  /workspaces/{wid}/events:
    get:
      tags: [sse]
      summary: SSE event stream
      description: |
        Open a Server-Sent Events stream for real-time updates in a workspace. Events include new messages, reactions, typing indicators, presence changes, and channel updates. Supports reconnection with Last-Event-ID header to catch up on missed events.
      operationId: events
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SSEEvent'

  /workspaces/{wid}/typing/start:
    post:
      tags: [sse]
      summary: Start typing indicator
      description: |
        Broadcast a typing indicator to other members of a channel. The indicator automatically expires after a few seconds if not refreshed.
      operationId: startTyping
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id:
                  type: string
                  example: '01JQ3KMQ8YNBC3DFHM6RWVS7AG'
      responses:
        '200':
          description: Typing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /workspaces/{wid}/typing/stop:
    post:
      tags: [sse]
      summary: Stop typing indicator
      description: |
        Clear the typing indicator for a channel. Called when the user stops typing or sends their message.
      operationId: stopTyping
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel_id]
              properties:
                channel_id:
                  type: string
                  example: '01JQ3KMQ8YNBC3DFHM6RWVS7AG'
      responses:
        '200':
          description: Typing stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    workspaceId:
      name: wid
      in: path
      required: true
      schema:
        type: string
      description: Workspace ID
    channelId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Channel ID
    messageId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Message ID

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            error:
              code: VALIDATION_ERROR
              message: Invalid request parameters
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            error:
              code: NOT_AUTHENTICATED
              message: Not authenticated
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            error:
              code: PERMISSION_DENIED
              message: You do not have permission to perform this action
    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            error:
              code: CONFLICT
              message: Resource already exists

  schemas:
    # User schemas
    UserProfile:
      type: object
      required: [id, display_name, status, created_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        display_name:
          type: string
          example: 'Alice Chen'
        avatar_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        gravatar_url:
          type: string
          example: 'https://www.gravatar.com/avatar/abc123?d=mp'
        status:
          type: string
          example: 'In a meeting'
        created_at:
          type: string
          format: date-time

    UpdateProfileInput:
      type: object
      properties:
        display_name:
          type: string
          example: 'Alice Chen'

    AvatarUploadResponse:
      type: object
      required: [avatar_url]
      properties:
        avatar_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'

    WorkspaceIconUploadResponse:
      type: object
      required: [icon_url]
      properties:
        icon_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'

    User:
      type: object
      required: [id, email, display_name, status, created_at, updated_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        email:
          type: string
          format: email
          example: 'alice@example.com'
        email_verified_at:
          type: string
          format: date-time
        display_name:
          type: string
          example: 'Alice Chen'
        avatar_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        gravatar_url:
          type: string
          example: 'https://www.gravatar.com/avatar/abc123?d=mp'
        status:
          type: string
          example: 'In a meeting'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PermissionLevel:
      type: string
      enum: [everyone, members, admins]
      description: Controls which workspace roles can perform an action

    # Workspace schemas
    WorkspaceSettings:
      type: object
      properties:
        show_join_leave_messages:
          type: boolean
          default: true
          description: Whether to show system messages when users join or leave channels
        who_can_create_channels:
          $ref: '#/components/schemas/PermissionLevel'
          default: members
        who_can_create_invites:
          $ref: '#/components/schemas/PermissionLevel'
          default: admins
        who_can_pin_messages:
          $ref: '#/components/schemas/PermissionLevel'
          default: members
        who_can_manage_custom_emoji:
          $ref: '#/components/schemas/PermissionLevel'
          default: members

    Workspace:
      type: object
      required: [id, name, settings, created_at, updated_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        name:
          type: string
          example: 'general'
        icon_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        settings:
          type: string
          description: JSON string containing workspace settings (for backward compatibility)
        parsed_settings:
          $ref: '#/components/schemas/WorkspaceSettings'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceSummary:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        name:
          type: string
          example: 'general'
        icon_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        sort_order:
          type: integer
          example: 1
          description: User's custom sort order for this workspace
        ban:
          type: object
          description: Present when the user is banned from this workspace
          properties:
            reason:
              type: string
              example: 'Repeated spam'
            expires_at:
              type: string
              format: date-time

    WorkspaceNotificationSummary:
      type: object
      required: [workspace_id, unread_count, notification_count]
      properties:
        workspace_id:
          type: string
          example: '01JQ3KMP2RQHYJ5ZV8NMWCX4ET'
        unread_count:
          type: integer
          example: 12
        notification_count:
          type: integer
          example: 3

    WorkspaceMembership:
      type: object
      required: [id, user_id, workspace_id, role, created_at, updated_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        user_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        workspace_id:
          type: string
          example: '01JQ3KMP2RQHYJ5ZV8NMWCX4ET'
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        display_name_override:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceMemberWithUser:
      allOf:
        - $ref: '#/components/schemas/WorkspaceMembership'
        - type: object
          required: [email, display_name]
          properties:
            email:
              type: string
              format: email
              example: 'alice@example.com'
            display_name:
              type: string
              example: 'Alice Chen'
            avatar_url:
              type: string
              example: '/files/01JQ3KMT6B/download?sig=abc'
            gravatar_url:
              type: string
              example: 'https://www.gravatar.com/avatar/abc123?d=mp'
            is_banned:
              type: boolean
              description: Whether the user is currently banned from the workspace

    WorkspaceRole:
      type: string
      enum: [owner, admin, member, guest]

    Invite:
      type: object
      required: [id, workspace_id, code, role, use_count, created_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        workspace_id:
          type: string
          example: '01JQ3KMP2RQHYJ5ZV8NMWCX4ET'
        code:
          type: string
          example: 'abc123def'
        invited_email:
          type: string
          format: email
          example: 'newuser@example.com'
        role:
          $ref: '#/components/schemas/WorkspaceRole'
        created_by:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        max_uses:
          type: integer
          example: 25
        use_count:
          type: integer
          example: 5
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    # Channel schemas
    Channel:
      type: object
      required: [id, workspace_id, name, type, is_default, created_at, updated_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        workspace_id:
          type: string
          example: '01JQ3KMP2RQHYJ5ZV8NMWCX4ET'
        name:
          type: string
          example: 'general'
        description:
          type: string
        type:
          $ref: '#/components/schemas/ChannelType'
        is_default:
          type: boolean
          description: Whether this is the default channel (like #general in Slack)
        dm_participant_hash:
          type: string
          example: 'hash_abc123'
        archived_at:
          type: string
          format: date-time
        created_by:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChannelWithMembership:
      allOf:
        - $ref: '#/components/schemas/Channel'
        - type: object
          required: [unread_count, is_starred, notification_count]
          properties:
            channel_role:
              $ref: '#/components/schemas/ChannelRole'
            last_read_message_id:
              type: string
              example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
            unread_count:
              type: integer
              example: 12
            notification_count:
              type: integer
              example: 3
            is_starred:
              type: boolean
            dm_participants:
              type: array
              items:
                $ref: '#/components/schemas/ChannelMember'
              description: For DM channels, the other participants (excluding current user)

    ChannelType:
      type: string
      enum: [public, private, dm, group_dm, voice]

    ChannelRole:
      type: string
      enum: [admin, poster, viewer]

    ChannelMember:
      type: object
      required: [user_id, email, display_name]
      properties:
        user_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        email:
          type: string
          format: email
          example: 'alice@example.com'
        display_name:
          type: string
          example: 'Alice Chen'
        avatar_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        gravatar_url:
          type: string
          example: 'https://www.gravatar.com/avatar/abc123?d=mp'
        channel_role:
          $ref: '#/components/schemas/ChannelRole'

    # Message schemas
    MessageType:
      type: string
      enum: [user, system]

    SystemEventType:
      type: string
      enum: [user_joined, user_left, user_added, user_converted_channel, channel_renamed, channel_visibility_changed, channel_description_updated, message_pinned, message_unpinned]

    SystemEventData:
      type: object
      required: [event_type, user_id, user_display_name, channel_name]
      properties:
        event_type:
          $ref: '#/components/schemas/SystemEventType'
        user_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
          description: The user who joined/left/was added
        user_display_name:
          type: string
          example: 'Alice Chen'
          description: Display name of the user at the time of the event
        channel_name:
          type: string
          example: 'general'
          description: Name of the channel
        actor_id:
          type: string
          example: '01JQ3KMS4WTVY6BN8FRCJD2HAQ'
          description: The user who performed the action (for user_added)
        actor_display_name:
          type: string
          example: 'Bob Martinez'
          description: Display name of the actor
        old_channel_name:
          type: string
          example: 'old-channel-name'
          description: Previous channel name (for rename events)
        channel_type:
          type: string
          example: 'public'
          description: New channel type (for visibility change events)
        message_id:
          type: string
          example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
          description: Referenced message ID (for pin/unpin events)

    Message:
      type: object
      required: [id, channel_id, content, reply_count, created_at, updated_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        channel_id:
          type: string
          example: '01JQ3KMQ8YNBC3DFHM6RWVS7AG'
        user_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        content:
          type: string
          example: 'Hello, world!'
        type:
          $ref: '#/components/schemas/MessageType'
        system_event:
          $ref: '#/components/schemas/SystemEventData'
        thread_parent_id:
          type: string
          example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
        reply_count:
          type: integer
          example: 3
        last_reply_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        also_send_to_channel:
          type: boolean
        pinned_at:
          type: string
          format: date-time
        pinned_by:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'

    MessageWithUser:
      allOf:
        - $ref: '#/components/schemas/Message'
        - type: object
          properties:
            user_display_name:
              type: string
              example: 'Alice Chen'
            user_avatar_url:
              type: string
              example: '/files/01JQ3KMT6B/download?sig=abc'
            user_gravatar_url:
              type: string
              example: 'https://www.gravatar.com/avatar/abc123?d=mp'
            reactions:
              type: array
              items:
                $ref: '#/components/schemas/Reaction'
            thread_participants:
              type: array
              items:
                $ref: '#/components/schemas/ThreadParticipant'
            attachments:
              type: array
              items:
                $ref: '#/components/schemas/Attachment'
            link_preview:
              $ref: '#/components/schemas/LinkPreview'

    ThreadParticipant:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        display_name:
          type: string
          example: 'Alice Chen'
        avatar_url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        gravatar_url:
          type: string
          example: 'https://www.gravatar.com/avatar/abc123?d=mp'

    Attachment:
      type: object
      required: [id, filename, content_type, size_bytes, url, created_at]
      properties:
        id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        filename:
          type: string
          example: 'report.pdf'
        content_type:
          type: string
          example: 'application/pdf'
        size_bytes:
          type: integer
          format: int64
          example: 1048576
        url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
          description: Download URL for the attachment
        created_at:
          type: string
          format: date-time

    LinkPreview:
      type: object
      required: [url, type]
      properties:
        url:
          type: string
          example: '/files/01JQ3KMT6B/download?sig=abc'
        type:
          type: string
          enum: [external, message]
          default: external
        title:
          type: string
          example: 'Example Page'
        description:
          type: string
        image_url:
          type: string
          example: 'https://example.com/image.png'
        site_name:
          type: string
          example: 'example.com'
        linked_message_id:
          type: string
          example: '01JQ3KMR5KVDW2TG9NHP0XEJBL'
        linked_channel_id:
          type: string
          example: '01JQ3KMQ8YNBC3DFHM6RWVS7AG'
        linked_channel_name:
          type: string
          example: 'random'
        linked_channel_type:
          type: string
          example: 'public'
        message_author_id:
          type: string
          example: '01JQ3KMN7XFGY4P6WBR2SZTA9V'
        message_author_name:
          type: string
          example: 'Alice Chen'
        message_author_avatar_url:
          type: string
