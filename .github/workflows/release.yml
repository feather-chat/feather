name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-frontend:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache-dependency-path: api/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: make install

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1

      - name: Generate types
        run: make generate-types

      - name: Build frontend
        run: pnpm --filter @enzyme/web build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  build-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache-dependency-path: api/go.sum

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: api/internal/web/dist/

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd api
          BINARY_NAME="enzyme-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags="-s -w -X github.com/enzyme/api/internal/version.Version=${VERSION}" -o "../${BINARY_NAME}" ./cmd/enzyme

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enzyme-${{ matrix.goos }}-${{ matrix.goarch }}
          path: enzyme-${{ matrix.goos }}-${{ matrix.goarch }}*

  build-mobile:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --filter @enzyme/mobile...

      - name: Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: 18.4.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS and Android
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive

      - name: Write code signing key
        run: echo "${{ secrets.EXPO_CODE_SIGNING_PRIVATE_KEY }}" > apps/mobile/certs/private-key.pem

      - name: Publish OTA update
        working-directory: apps/mobile
        run: eas update --channel production --message "v${GITHUB_REF_NAME#v}" --private-key-path ./certs/private-key.pem --non-interactive

  release:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "enzyme-*" -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
