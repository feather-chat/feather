name: Push Relay

on:
  push:
    branches: [main]
    paths:
      - 'api/cmd/push-relay/**'
      - 'api/go.mod'
      - 'api/go.sum'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache-dependency-path: api/go.sum

      - name: Build binary
        working-directory: api
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/push-relay ./cmd/push-relay/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: push-relay-linux-amd64
          path: api/bin/push-relay
